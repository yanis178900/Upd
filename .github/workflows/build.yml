name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config cmake libffi-dev libssl-dev
        pip install buildozer==1.4.0 cython virtualenv setuptools
    - name: Build
      run: yes | buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: bin/*.apk
